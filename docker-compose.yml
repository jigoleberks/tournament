services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["127.0.0.1:5432:5432"]
  web:
    build: { context: ., dockerfile: Dockerfile.dev }
    command: sh -c "rm -f tmp/pids/server.pid && bin/rails tailwindcss:build && bin/rails server -b 0.0.0.0 -p 3000"
    environment:
      # No database path here — let config/database.yml pick the name per env
      # so dev → tournament_development, test → tournament_test (separate DBs).
      # Including the path made `bin/rails test` truncate the dev DB on every run.
      DATABASE_URL: postgres://postgres:postgres@db:5432
      RAILS_ENV: development
      APP_NAME: ${APP_NAME:-Tournament}
      APP_HOST: ${APP_HOST:-localhost}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-UTC}
      MAIL_FROM: ${MAIL_FROM:-Tournament <noreply@localhost>}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      SEED_CLUB_NAME: ${SEED_CLUB_NAME:-Example Fishing Club}
      SEED_ORGANIZER_NAME: ${SEED_ORGANIZER_NAME:-Organizer}
      SEED_ORGANIZER_EMAIL: ${SEED_ORGANIZER_EMAIL:-organizer@example.com}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-}
      SOLID_QUEUE_IN_PUMA: "1"
    volumes: [".:/app"]
    ports: ["127.0.0.1:3000:3000"]
    depends_on: [db]
volumes:
  pgdata:
